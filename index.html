<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MobileAirLLM Web CLI</title>
    <style>
        body {
            background-color: #1e1e1e;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        #terminal {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #333;
            background-color: #000;
            word-wrap: break-word;
        }
        #cli-container {
            display: flex;
        }
        #prompt {
            color: #00ff00;
            padding-right: 5px;
        }
        #cli-input {
            background: transparent;
            border: none;
            color: #00ff00;
            font-family: inherit;
            font-size: 16px;
            flex-grow: 1;
            outline: none;
        }
        .system { color: #888; }
        .error { color: #ff5555; }
        .success { color: #55ff55; }
    </style>
</head>
<body>

    <div id="terminal">
        <div class="system">MobileAirLLM v1.0 [Web CLI Edition]</div>
        <div class="system">Type 'help' to see available commands.</div>
        <br>
    </div>
    <div id="cli-container">
        <span id="prompt">user@iphone:~$</span>
        <input type="text" id="cli-input" autocomplete="off" spellcheck="false" autofocus>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const cliInput = document.getElementById('cli-input');

        // State Management
        let config = {
            tgToken: localStorage.getItem('tgToken') || '',
            tgChatId: localStorage.getItem('tgChatId') || '',
            hfToken: localStorage.getItem('hfToken') || ''
        };

        // UI Logger
        function log(message, type = '') {
            const div = document.createElement('div');
            div.className = type;
            div.innerHTML = message;
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        }

        // Force Garbage Collection Yielding
        // This is CRITICAL for iOS to prevent tab crashes
        const yieldThread = () => new Promise(resolve => setTimeout(resolve, 50));

        // Telegram / Pentaract API Fetcher
        async function fetchChunkFromTelegram(fileId) {
            log(`Fetching file path for ${fileId}...`, 'system');
            const getFileUrl = `https://api.telegram.org/bot${config.tgToken}/getFile?file_id=${fileId}`;
            
            const fileRes = await fetch(getFileUrl);
            const fileData = await fileRes.json();
            
            if (!fileData.ok) throw new Error(`Telegram API Error: ${fileData.description}`);
            
            const downloadUrl = `https://api.telegram.org/file/bot${config.tgToken}/${fileData.result.file_path}`;
            log(`Downloading chunk...`, 'system');
            
            const chunkRes = await fetch(downloadUrl);
            const arrayBuffer = await chunkRes.arrayBuffer();
            return arrayBuffer;
        }

        // The Memory-Safe Layer-by-Layer Loop
        async function runInferenceSimulation(mockFileIds) {
            log(`Starting layer-by-layer inference...`, 'success');
            
            for (let i = 0; i < mockFileIds.length; i++) {
                log(`[Layer ${i+1}/${mockFileIds.length}] Loading into RAM...`);
                
                // 1. Fetch chunk into memory
                let chunkBuffer = await fetchChunkFromTelegram(mockFileIds[i]);
                log(`[Layer ${i+1}] Loaded ${(chunkBuffer.byteLength / 1024 / 1024).toFixed(2)} MB. Processing...`);
                
                // --- INSERT WebGPU / WASM MATMUL HERE ---
                // e.g., processTransformerBlock(chunkBuffer, currentActivations);
                await yieldThread(); // Simulate processing time
                
                // 2. Clear memory aggressively
                chunkBuffer = null; 
                
                // 3. Yield to the browser's Garbage Collector BEFORE the next loop
                log(`[Layer ${i+1}] Evicted from RAM. Yielding to GC...`, 'system');
                await yieldThread(); 
            }
            
            log(`Inference complete. Output: "Hello from MobileAirLLM!"`, 'success');
        }

        // Command Parser
        cliInput.addEventListener('keypress', async function (e) {
            if (e.key === 'Enter') {
                const command = this.value.trim();
                if (!command) return;
                
                log(`<br><span style="color:#fff">user@iphone:~$ ${command}</span>`);
                this.value = '';
                
                const args = command.split(' ');
                const cmd = args[0].toLowerCase();

                try {
                    switch(cmd) {
                        case 'help':
                            log(`Available commands:`);
                            log(`  config tg &lt;token&gt; &lt;chat_id&gt; - Set Telegram bot credentials`);
                            log(`  config hf &lt;token&gt;           - Set Hugging Face token`);
                            log(`  search &lt;query&gt;              - Search Hugging Face models`);
                            log(`  run                           - Start inference loop`);
                            log(`  clear                         - Clear terminal`);
                            break;

                        case 'config':
                            if (args[1] === 'tg' && args.length === 4) {
                                config.tgToken = args[2];
                                config.tgChatId = args[3];
                                localStorage.setItem('tgToken', config.tgToken);
                                localStorage.setItem('tgChatId', config.tgChatId);
                                log('Telegram credentials saved to local storage.', 'success');
                            } else if (args[1] === 'hf' && args.length === 3) {
                                config.hfToken = args[2];
                                localStorage.setItem('hfToken', config.hfToken);
                                log('Hugging Face token saved.', 'success');
                            } else {
                                log('Usage: config tg <token> <chat_id> OR config hf <token>', 'error');
                            }
                            break;

                        case 'search':
                            if (args.length < 2) {
                                log('Usage: search <model_name>', 'error');
                                break;
                            }
                            const query = args.slice(1).join(' ');
                            log(`Searching Hugging Face for "${query}"...`, 'system');
                            const hfHeaders = config.hfToken ? { 'Authorization': `Bearer ${config.hfToken}` } : {};
                            const res = await fetch(`https://huggingface.co/api/models?search=${encodeURIComponent(query)}&limit=5`, { headers: hfHeaders });
                            const models = await res.json();
                            models.forEach(m => log(`- ${m.id} (${m.downloads} downloads)`));
                            break;

                        case 'run':
                            if (!config.tgToken) {
                                log('Missing Telegram Token! Run: config tg <token> <chat_id>', 'error');
                                break;
                            }
                            // Replace these with actual file_ids uploaded by your Pentaract bot
                            const mockTelegramFileIds = [
                                "BQACAgQAAxkBAAMbZ...", // Layer 1 chunk
                                "BQACAgQAAxkBAAMcZ..."  // Layer 2 chunk
                            ]; 
                            // Note: We use fake IDs here. The API will throw an error until you paste real file_ids
                            await runInferenceSimulation(mockTelegramFileIds).catch(err => log(err.message, 'error'));
                            break;

                        case 'clear':
                            terminal.innerHTML = '';
                            break;

                        default:
                            log(`Command not found: ${cmd}. Type 'help'.`, 'error');
                    }
                } catch (err) {
                    log(`Error: ${err.message}`, 'error');
                }
            }
        });
    </script>
</body>
</html>
